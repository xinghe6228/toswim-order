<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TOSWIM 跳台挂饰预售接龙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#030712;color:#fff;min-height:100vh;max-width:480px;margin:0 auto}
.header{position:sticky;top:0;z-index:20;background:#030712;border-bottom:1px solid #1f2937;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700}
.header .sub{font-size:11px;color:#6b7280}
.tabs{display:flex;gap:4px}
.tab{padding:6px 12px;font-size:12px;border-radius:20px;border:1px solid #374151;color:#9ca3af;background:none;cursor:pointer}
.tab.active{background:#2563eb;border-color:#2563eb;color:#fff}
.content{padding:16px}
.stats-bar{display:flex;gap:12px;margin-bottom:16px}
.stat{flex:1;background:#111827;border-radius:12px;padding:12px;text-align:center}
.stat .num{font-size:22px;font-weight:700}
.stat .num.blue{color:#60a5fa}.stat .num.green{color:#34d399}.stat .num.amber{color:#fbbf24}
.stat .label{font-size:11px;color:#6b7280;margin-top:2px}
.set-box{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:12px;margin-bottom:16px}
.set-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.set-btn{background:#1f2937;border:1px solid #374151;color:#fff;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer}
.set-btn:hover{border-color:#2563eb;background:rgba(37,99,235,0.15)}
.clear-btn{background:#1f2937;border:1px solid rgba(127,29,29,0.5);color:#f87171;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;margin-left:auto}
.hot-bar{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:12px;margin-bottom:16px}
.hot-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.hot-item{display:flex;align-items:center;gap:6px;background:#1f2937;border-radius:8px;padding:6px 8px;flex-shrink:0}
.rank-badge{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.rank-1{background:#ef4444}.rank-2{background:#f97316}.rank-3{background:#f59e0b}.rank-n{background:#4b5563}
.hot-item img{width:24px;height:24px;border-radius:4px;object-fit:cover}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.card{background:#111827;border-radius:12px;overflow:hidden;border:1px solid #1f2937}
.card.hot-card{border-color:rgba(180,83,9,0.5)}
.card img.prod{width:100%;height:144px;object-fit:cover;display:block}
.card .img-wrap{position:relative}
.badge{position:absolute;font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600;color:#fff}
.badge-qty{top:8px;left:8px;width:24px;height:24px;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;padding:0}
.badge-rank{top:8px;right:8px}
.badge-rank.r1{background:#ef4444}.badge-rank.r2{background:#f97316}.badge-rank.r3{background:#f59e0b}
.card .info{padding:12px}
.card .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.price{font-size:14px;font-weight:700;color:#fbbf24}
.add-btn{background:#2563eb;color:#fff;font-size:12px;padding:6px 12px;border-radius:20px;border:none;cursor:pointer;font-weight:500}
.qty-ctrl{display:flex;align-items:center;gap:10px}
.qty-btn{width:28px;height:28px;border-radius:50%;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-minus{background:#374151}.qty-plus{background:#2563eb}
.heat{margin-top:8px}
.heat-bar{height:6px;background:#1f2937;border-radius:4px;overflow:hidden}
.heat-fill{height:100%;border-radius:4px;transition:width 0.5s}
.bottom-bar{position:sticky;bottom:0;background:#030712;border-top:1px solid #1f2937;padding:12px 16px}
.cart-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.cart-tag{background:#1f2937;padding:2px 8px;border-radius:4px;font-size:11px;color:#9ca3af}
.nick-input{width:100%;background:#1f2937;border:1px solid #374151;border-radius:8px;padding:10px 12px;font-size:14px;color:#fff;outline:none;margin-bottom:12px}
.nick-input:focus{border-color:#2563eb}
.submit-btn{width:100%;padding:12px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer;background:#2563eb;color:#fff}
.submit-btn:disabled{background:#1f2937;color:#4b5563;cursor:not-allowed}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:50}
.modal{background:#1f2937;border-radius:16px;padding:32px;text-align:center;margin:16px}
.modal .check{width:56px;height:56px;border-radius:50%;background:#059669;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px}
.hidden{display:none}
.list-item{background:#111827;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.rank-list-item{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.rank-list-item.top{background:#111827;border-radius:12px;padding:8px;border:1px solid #1f2937}
.rank-list-item img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0}
.rank-bar{height:8px;background:#1f2937;border-radius:4px;overflow:hidden;margin-top:4px}
.rank-fill{height:100%;border-radius:4px;transition:width 0.5s}
.section-title{font-size:14px;font-weight:500;color:#9ca3af;margin-bottom:12px}
.admin-table{width:100%;font-size:12px}
.admin-table th{text-align:left;padding:4px 0;color:#6b7280}
.admin-table td{padding:8px 0;border-top:1px solid rgba(31,41,55,0.5)}
.td-sku{display:flex;align-items:center;gap:8px}
.td-sku img{width:28px;height:28px;border-radius:4px;object-fit:cover}
.reset-btn{width:100%;padding:10px;border-radius:8px;font-size:14px;color:#f87171;border:1px solid rgba(127,29,29,0.5);background:rgba(127,29,29,0.15);cursor:pointer;margin-top:16px}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:#6b7280;font-size:14px}
.sync-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-left:6px}
.sync-ok{background:#34d399}
.sync-loading{background:#fbbf24;animation:pulse 1s infinite}
.sync-err{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="header">
  <div><h1>TOSWIM 跳台挂饰</h1><div class="sub">预售接龙 · 首批19.9元 <span id="sync-indicator" class="sync-dot sync-loading"></span></div></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('shop')">选购</button>
    <button class="tab" onclick="switchTab('stats')">数据</button>
    <button class="tab" onclick="switchTab('admin')">管理</button>
  </div>
</div>
<div id="page-shop" class="content"><div class="loading">加载数据中...</div></div>
<div id="page-stats" class="content hidden"></div>
<div id="page-admin" class="content hidden"></div>
<div id="overlay" class="overlay hidden" onclick="this.classList.add('hidden')">
  <div class="modal"><div class="check">&#10003;</div><h3>接龙成功！</h3><p style="font-size:14px;color:#9ca3af;margin-top:4px">稍后会同步支付方式</p></div>
</div>

const SKU=[
  {id:0,name:"0号",desc:"黄紫"},{id:1,name:"1号",desc:"橙蓝"},{id:2,name:"2号",desc:"玫红绿"},
  {id:3,name:"3号",desc:"白红"},{id:4,name:"4号",desc:"白蓝"},{id:5,name:"5号",desc:"紫绿"},
  {id:6,name:"6号",desc:"薄荷粉"},{id:7,name:"7号",desc:"珊瑚绿"},{id:8,name:"8号",desc:"红黄"},
  {id:9,name:"9号",desc:"白青"}
];

const BIN_ID="69bd45c8b7ec241ddc878c30";
const API_KEY="$2a$10$/StrSrSmu.XfUQBzoU5RV.ToSWyiqWQHKBX/ASi1OiIUNBXWzCmme";
const API_URL="https://api.jsonbin.io/v3/b/"+BIN_ID;

let orders=[];
let cart={};
let currentTab="shop";
let syncing=false;

function setSyncStatus(s){
  const el=document.getElementById("sync-indicator");
  if(el) el.className="sync-dot sync-"+s;
}

async function loadOrders(){
  try{
    setSyncStatus("loading");
    const r=await fetch(API_URL+"/latest",{headers:{"X-Master-Key":API_KEY}});
    const d=await r.json();
    if(d.record && d.record.orders) orders=d.record.orders;
    setSyncStatus("ok");
  }catch(e){
    console.error("Load error:",e);
    const local=localStorage.getItem("toswim-backup");
    if(local) orders=JSON.parse(local);
    setSyncStatus("err");
  }
  render();
}

async function saveOrders(){
  localStorage.setItem("toswim-backup",JSON.stringify(orders));
  try{
    setSyncStatus("loading");
    syncing=true;
    await fetch(API_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify({orders:orders})});
    setSyncStatus("ok");
  }catch(e){
    console.error("Save error:",e);
    setSyncStatus("err");
  }
  syncing=false;
}

function cartTotal(){return Object.values(cart).reduce((a,b)=>a+b,0)}
function getTotals(){
  const t={};let g=0;
  SKU.forEach(s=>t[s.id]=0);
  orders.forEach(o=>Object.entries(o.items).forEach(([k,v])=>{t[+k]=(t[+k]||0)+v;g+=v}));
  return{sku:t,grand:g};
}
function getRanks(st){
  const sorted=[...SKU].sort((a,b)=>(st[b.id]||0)-(st[a.id]||0));
  const map={};sorted.forEach((s,i)=>{if(st[s.id]>0)map[s.id]=i+1});
  return{sorted,map};
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tab").forEach((b,i)=>b.classList.toggle("active",["shop","stats","admin"][i]===tab));
  ["shop","stats","admin"].forEach(t=>document.getElementById("page-"+t).classList.toggle("hidden",t!==tab));
  if(tab==="stats"||tab==="admin") loadOrders();
  render();
}

function updateCart(id,d){cart[id]=Math.max(0,Math.min(99,(cart[id]||0)+d));if(cart[id]===0)delete cart[id];render()}
function addSet(n){for(let i=0;i<=9;i++)cart[i]=(cart[i]||0)+n;render()}
function clearCart(){cart={};render()}

async function submitOrder(){
  const el=document.getElementById("nick-input");
  const nick=el?el.value.trim():"";
  if(!nick||cartTotal()===0)return;
  await loadOrders();
  orders.push({id:Date.now(),name:nick,items:{...cart},total:cartTotal(),time:new Date().toLocaleString("zh-CN")});
  await saveOrders();
  cart={};render();
  document.getElementById("overlay").classList.remove("hidden");
  setTimeout(()=>document.getElementById("overlay").classList.add("hidden"),3000);
}

async function resetAll(){if(confirm("确认清空所有订单数据？")){orders=[];await saveOrders();render()}}

function rc(r){return r===1?"rank-1":r===2?"rank-2":r===3?"rank-3":"rank-n"}
function rl(r){return r===1?"爆款":r===2?"热门":r===3?"人气":""}
function hc(r){return r===1?"#ef4444":r===2?"#f97316":r===3?"#f59e0b":"#3b82f6"}

function render(){
  const{sku:st,grand}=getTotals();
  const mx=Math.max(...Object.values(st),1);
  const{sorted,map:rm}=getRanks(st);

  let h='<div class="stats-bar"><div class="stat"><div class="num blue">'+orders.length+'</div><div class="label">已接龙</div></div><div class="stat"><div class="num green">'+grand+'</div><div class="label">总件数</div></div><div class="stat"><div class="num amber">¥19.9</div><div class="label">预售价</div></div></div>';

  if(orders.length>0){
    const t5=sorted.filter(s=>st[s.id]>0).slice(0,5);
    h+='<div class="hot-bar"><div style="font-size:12px;color:#9ca3af;margin-bottom:8px">实时热度排行</div><div class="hot-scroll">';
    t5.forEach((s,i)=>{h+='<div class="hot-item"><span class="rank-badge '+rc(i+1)+'">'+(i+1)+'</span><img src="'+PRODUCT_IMAGES[s.id]+'"><span style="font-size:12px;font-weight:500">'+s.name+'</span><span style="font-size:12px;color:#fbbf24;font-weight:700">'+st[s.id]+'</span></div>'});
    h+='</div></div>';
  }

  h+='<div class="set-box"><div><span style="font-size:14px;font-weight:500">整套购买</span><span style="font-size:12px;color:#6b7280;margin-left:8px">0-9号各1个</span></div><div class="set-btns">';
  [1,2,3,4].forEach(n=>{h+='<button class="set-btn" onclick="addSet('+n+')">+'+n+'套 ('+(n*10)+'件)</button>'});
  if(cartTotal()>0)h+='<button class="clear-btn" onclick="clearCart()">清空</button>';
  h+='</div></div>';

  h+='<div class="grid">';
  SKU.forEach(s=>{
    const q=cart[s.id]||0,sold=st[s.id]||0,rank=rm[s.id]||99,isTop=rank<=3;
    h+='<div class="card'+(isTop?" hot-card":"")+'"><div class="img-wrap"><img class="prod" src="'+PRODUCT_IMAGES[s.id]+'">';
    if(q>0)h+='<div class="badge badge-qty">'+q+'</div>';
    if(isTop)h+='<div class="badge badge-rank r'+rank+'">NO.'+rank+'</div>';
    h+='</div><div class="info"><div class="row"><span style="font-size:14px;font-weight:500">'+s.name+'</span><span style="font-size:12px;color:#6b7280">'+s.desc+'</span></div><div class="row"><span class="price">¥19.9</span>';
    if(q===0)h+='<button class="add-btn" onclick="updateCart('+s.id+',1)">加入</button>';
    else h+='<div class="qty-ctrl"><button class="qty-btn qty-minus" onclick="updateCart('+s.id+',-1)">-</button><span style="font-size:14px;font-weight:700;width:16px;text-align:center">'+q+'</span><button class="qty-btn qty-plus" onclick="updateCart('+s.id+',1)">+</button></div>';
    h+='</div>';
    if(sold>0){const c=hc(rank);h+='<div class="heat"><div style="display:flex;justify-content:space-between;margin-bottom:4px;align-items:center"><span style="font-size:11px;color:#9ca3af">'+sold+'人选择</span>';if(isTop)h+='<span style="font-size:10px;padding:2px 6px;border-radius:4px;color:#fff;font-weight:600;background:'+c+'">'+rl(rank)+'</span>';h+='</div><div class="heat-bar"><div class="heat-fill" style="width:'+Math.round(sold/mx*100)+'%;background:'+c+'"></div></div></div>'}
    h+='</div></div>';
  });
  h+='</div>';

  if(cartTotal()>0){
    h+='<div class="bottom-bar"><div class="cart-tags">';
    Object.entries(cart).sort(([a],[b])=>a-b).forEach(([k,v])=>{h+='<span class="cart-tag">'+k+'号x'+v+'</span>'});
    h+='</div><input id="nick-input" class="nick-input" placeholder="你的昵称（必填）"><button class="submit-btn" onclick="submitOrder()">提交接龙 · '+cartTotal()+'件 · ¥'+(cartTotal()*19.9).toFixed(1)+'</button></div>';
  }
  document.getElementById("page-shop").innerHTML=h;

  // STATS
  let s2='<div class="stats-bar"><div class="stat"><div class="num">'+orders.length+'</div><div class="label">总订单</div></div><div class="stat"><div class="num green">'+grand+'</div><div class="label">总件数</div></div><div class="stat"><div class="num amber">¥'+(grand*19.9).toFixed(0)+'</div><div class="label">总金额</div></div></div>';
  s2+='<div class="section-title">各号码销量排行</div>';
  sorted.forEach((sk,i)=>{
    const sold=st[sk.id]||0,isTop=i<3&&sold>0,c=hc(i<3?i+1:99);
    s2+='<div class="rank-list-item'+(isTop?" top":"")+'">';
    if(sold>0)s2+='<span class="rank-badge '+rc(i+1)+'" style="flex-shrink:0">'+(i+1)+'</span>';
    s2+='<img src="'+PRODUCT_IMAGES[sk.id]+'"><div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+sk.name+' '+sk.desc+'</span><span style="font-weight:700">'+sold+'件</span></div><div class="rank-bar"><div class="rank-fill" style="width:'+Math.round(sold/mx*100)+'%;background:'+c+'"></div></div></div></div>';
  });
  s2+='<div class="section-title" style="margin-top:20px">最近接龙</div>';
  orders.slice(-15).reverse().forEach(o=>{
    s2+='<div class="list-item" style="display:flex;justify-content:space-between;align-items:center;font-size:13px"><div><span style="font-weight:500">'+o.name+'</span><span style="color:#6b7280;margin-left:8px;font-size:11px">'+Object.entries(o.items).map(([k,v])=>k+"号x"+v).join(" ")+'</span></div><span style="color:#4b5563;font-size:11px">'+o.total+'件</span></div>';
  });
  if(!orders.length)s2+='<p style="text-align:center;color:#4b5563;padding:24px;font-size:14px">暂无接龙</p>';
  document.getElementById("page-stats").innerHTML=s2;

  // ADMIN
  let a='<div style="background:#111827;border-radius:12px;padding:16px;margin-bottom:16px"><div class="stats-bar" style="margin-bottom:16px"><div class="stat"><div class="num" style="font-size:20px">'+orders.length+'</div><div class="label">订单数</div></div><div class="stat"><div class="num green" style="font-size:20px">'+grand+'</div><div class="label">总件数</div></div><div class="stat"><div class="num amber" style="font-size:20px">¥'+(grand*19.9).toFixed(0)+'</div><div class="label">总金额</div></div></div>';
  a+='<table class="admin-table"><thead><tr><th>号码</th><th style="text-align:right">件数</th><th style="text-align:right">占比</th></tr></thead><tbody>';
  sorted.forEach(sk=>{const sold=st[sk.id]||0;a+='<tr><td><div class="td-sku"><img src="'+PRODUCT_IMAGES[sk.id]+'"><span>'+sk.name+'</span></div></td><td style="text-align:right;font-weight:500">'+sold+'</td><td style="text-align:right;color:#6b7280">'+(grand>0?Math.round(sold/grand*100):0)+'%</td></tr>'});
  a+='</tbody></table></div>';
  a+='<div class="section-title">全部订单</div>';
  orders.forEach((o,i)=>{a+='<div class="list-item" style="font-size:12px"><div style="display:flex;justify-content:space-between;color:#6b7280"><span>#'+(i+1)+'</span><span>'+o.time+'</span></div><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-weight:500;color:#fff">'+o.name+'</span><span style="color:#9ca3af">'+Object.entries(o.items).map(([k,v])=>k+"号x"+v).join("  ")+'</span></div></div>'});
  a+='<button class="reset-btn" onclick="resetAll()">清空所有数据</button>';
  document.getElementById("page-admin").innerHTML=a;
}

// Auto-refresh every 10s
setInterval(()=>{if(!syncing&&currentTab!=="admin")loadOrders()},10000);
loadOrders();
</script>
</body>
</html>
